<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>WebAR Portofolio - Firmas Habibi</title>

    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="script.js"></script>
</head>

<body style="margin: 0px; overflow: hidden;">

    <!-- Setup AR Scene (Hapus rayOrigin: mouse karena kita pakai kursor visual) -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-assets>
            <img id="biodataImg" src="biodata.png">
        </a-assets>

        <!-- Deteksi Marker Hiro -->
        <a-marker preset="hiro">

            <!-- Gambar Biodata dengan Animasi Membesar (Zoom) -->
            <!-- Saat kursor masuk (mouseenter), scale membesar jadi 1.15 -->
            <!-- Saat kursor keluar (mouseleave), scale kembali ke 1 -->
            <a-image src="#biodataImg" position="0 0 0" rotation="-90 0 0" width="2.4" height="1.5" class="interaktif"
                animation__zoom="property: scale; to: 1.15 1.15 1.15; startEvents: mouseenter; dur: 300; easing: easeOutQuad"
                animation__unzoom="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 300; easing: easeOutQuad">

                <!-- Tombol 1: Portofolio -->
                <a-plane position="-0.6 -0.5 0.01" width="0.5" height="0.15" material="opacity: 0.0; transparent: true"
                    class="interaktif" url-handler="url: https://www.frmshbi.dev/projects">
                    <!-- (Teks dihapus agar murni transparan mengikuti desain gambarmu) -->
                </a-plane>

                <!-- Tombol 2: GitHub -->
                <a-plane position="0 -0.5 0.01" width="0.5" height="0.15" material="opacity: 0.0; transparent: true"
                    class="interaktif" url-handler="url: https://github.com/firmashabibii">
                </a-plane>

                <!-- Tombol 3: Instagram -->
                <a-plane position="0.6 -0.5 0.01" width="0.5" height="0.15" material="opacity: 0.0; transparent: true"
                    class="interaktif" url-handler="url: https://www.instagram.com/frmshbi/?hl=en">
                </a-plane>

            </a-image>
        </a-marker>

        <!-- Kamera dengan Kursor Fuse (Target bidik di tengah layar) -->
        <a-entity camera>
            <!-- fuseTimeout="1500" artinya butuh 1.5 detik ditahan untuk membuka link -->
            <a-cursor fuse="true" fuseTimeout="2500" raycaster="objects: .interaktif" color="#ffffff"
                animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 1500; from: 1 1 1; to: 0.2 0.2 0.2"
                animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeInCubic; dur: 300; to: 1 1 1">
            </a-cursor>
        </a-entity>

    </a-scene>
</body>

</html>
